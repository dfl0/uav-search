%YAML:1.0

#--------------------------------------------------------------------------------------------
# AirSim drone_1 / mono_camera — ORB-SLAM3 Calibration File (Examples_old format)
#
# Camera: mono_camera
#   Resolution : 640 x 480
#   FOV        : 90 degrees (horizontal)
#   Mount      : X=0.0, Y=0.0, Z=0.3 (body frame), Pitch=-45 deg, Roll=0, Yaw=0
#
# fx = fy = (Width/2) / tan(FOV/2) = 320 / tan(45°) = 320.0
# cx = 320.0, cy = 240.0
#--------------------------------------------------------------------------------------------

Camera.type: "PinHole"

# Camera Parameters (old format — no Camera1. prefix)
Camera.fx: 320.0
Camera.fy: 320.0
Camera.cx: 320.0
Camera.cy: 240.0

# Distortion coefficients (AirSim = ideal pinhole, no distortion)
Camera.k1: 0.0
Camera.k2: 0.0
Camera.p1: 0.0
Camera.p2: 0.0

Camera.width:  640
Camera.height: 480
Camera.fps:    30

# AirSim publishes BGR (OpenCV convention)
Camera.RGB: 0

#--------------------------------------------------------------------------------------------
# Extrinsics: Tbc = T_body_camera (takes point from Camera to IMU/Body frame)
#
# AirSim NED body frame: X forward, Y right, Z down
# Camera mounted at Z=0.3 in body frame, Pitch=-45deg (nose down)
#
# R = Ry(+45deg):
#   [ 0.7071   0.0   0.7071 ]
#   [ 0.0      1.0   0.0    ]
#   [-0.7071   0.0   0.7071 ]
#
# Translation: camera origin in body frame = (0, 0, 0.3)
# But Tbc translates from camera to body, so t = -R * t_cam_in_body
# t_cam_in_body = (0, 0, 0.3)
# t = -R * [0, 0, 0.3]' = [-0.7071*0.3, 0, -0.7071*0.3]' = [-0.2121, 0, -0.2121]
#--------------------------------------------------------------------------------------------
Tbc: !!opencv-matrix
   rows: 4
   cols: 4
   dt: f
   data: [ 0.70710678,  0.0,  0.70710678, -0.21213203,
           0.0,         1.0,  0.0,         0.0,
          -0.70710678,  0.0,  0.70710678, -0.21213203,
           0.0,         0.0,  0.0,         1.0]


#--------------------------------------------------------------------------------------------
# IMU Parameters
#--------------------------------------------------------------------------------------------
IMU.NoiseGyro:  1.7e-4
IMU.NoiseAcc:   2.0e-3
IMU.GyroWalk:   1.9e-5
IMU.AccWalk:    3.0e-3
IMU.Frequency: 100

#--------------------------------------------------------------------------------------------
# ORB Extractor
#--------------------------------------------------------------------------------------------
ORBextractor.nFeatures:   1000
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels:     8
ORBextractor.iniThFAST:   20
ORBextractor.minThFAST:   7

#--------------------------------------------------------------------------------------------
# Viewer
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize:        0.05
Viewer.KeyFrameLineWidth:   1.0
Viewer.GraphLineWidth:      0.9
Viewer.PointSize:           2.0
Viewer.CameraSize:          0.08
Viewer.CameraLineWidth:     3.0
Viewer.ViewpointX:          0.0
Viewer.ViewpointY:         -0.7
Viewer.ViewpointZ:         -3.5
Viewer.ViewpointF:          500.0